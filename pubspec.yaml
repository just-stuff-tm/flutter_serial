name: flutter_serial_workspace
publish_to: none

environment:
  sdk: ">=3.12.0-162.0.dev <4.0.0"

workspace:
  - packages/flutter_serial
  - packages/flutter_serial_platform_interface
  - packages/flutter_serial_linux
  - packages/flutter_serial_windows
  - packages/flutter_serial_macos
  - packages/flutter_serial_android
  - packages/flutter_serial_ios
  - packages/flutter_serial_web
  - example
  - packages/flutter_serial/example
