  - packages/flutter_serial_windows/example
  - packages/flutter_serial_macos/example
  - packages/flutter_serial_android/example
  - packages/flutter_serial_ios/example
  - packages/flutter_serial_web/example

dev_dependencies:
  melos: ^7.0.0
